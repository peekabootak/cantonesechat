<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>📷 カメラ翻訳 — Cantonese Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      touch-action: manipulation;
    }

    body {
      font-family: 'Inter', 'Noto Sans HK', sans-serif;
      background: #0a0e1a;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    .header {
      background: rgba(10, 14, 26, 0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      z-index: 50;
    }

    .header h1 {
      font-size: 1.05rem;
      font-weight: 600;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-back {
      padding: 7px 12px;
      background: rgba(139, 92, 246, 0.2);
      color: #a78bfa;
      border: 1px solid rgba(139, 92, 246, 0.3);
      border-radius: 8px;
      font-size: 16px;
      text-decoration: none;
      font-weight: 500;
    }

    .camera-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
    }

    .video-container {
      flex: 1;
      position: relative;
      background: #000;
      overflow: hidden;
    }

    #camera-video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #captured-canvas {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    .camera-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: 16px;
      border: 3px solid rgba(139, 92, 246, 0.35);
    }

    .camera-guide {
      background: rgba(0,0,0,0.55);
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.8rem;
      color: rgba(200, 190, 255, 0.9);
      backdrop-filter: blur(6px);
    }

    .captured-thumb {
      width: 100%;
      object-fit: contain;
      border-radius: 10px;
      border: 1px solid rgba(139,92,246,0.2);
      margin-bottom: 10px;
      background: #000;
    }

    .camera-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(10, 14, 26, 0.97);
      border-top: 1px solid rgba(139, 92, 246, 0.2);
      flex-shrink: 0;
    }

    .capture-btn {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 4px solid rgba(139, 92, 246, 0.6);
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .capture-btn::after {
      content: '';
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      transition: transform 0.15s;
    }

    .capture-btn:active::after { transform: scale(0.85); }

    .capture-btn.processing::after {
      background: linear-gradient(135deg, #e74c3c, #e67e22);
      animation: pulse-p 1s infinite;
    }

    @keyframes pulse-p {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(0.9); opacity: 0.7; }
    }

    .ctrl-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: rgba(139, 92, 246, 0.15);
      color: #c4b5fd;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* Results Panel */
    .results-panel {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      max-height: 70vh;
      background: rgba(15, 12, 41, 0.97);
      backdrop-filter: blur(20px);
      border-top: 2px solid rgba(139, 92, 246, 0.4);
      border-radius: 20px 20px 0 0;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 60;
      display: flex;
      flex-direction: column;
    }

    .results-panel.open { transform: translateY(0); }

    .results-handle {
      display: flex;
      justify-content: center;
      padding: 10px;
      flex-shrink: 0;
    }

    .results-handle .bar {
      width: 40px;
      height: 4px;
      border-radius: 2px;
      background: rgba(139, 92, 246, 0.4);
    }

    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px 10px;
      border-bottom: 1px solid rgba(139, 92, 246, 0.15);
      flex-shrink: 0;
    }

    .results-header h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #c4b5fd;
    }

    .results-close {
      background: rgba(239, 68, 68, 0.15);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .results-scroll {
      overflow-y: auto;
      padding: 14px 16px;
      padding-bottom: max(14px, env(safe-area-inset-bottom));
      flex: 1;
    }

    .result-section {
      background: rgba(30, 27, 55, 0.8);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .result-label {
      font-size: 0.7rem;
      color: #6b6b7b;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .result-text {
      font-size: 1.6rem;
      line-height: 1.5;
      color: #f0f0f0;
      word-break: break-all;
      margin-bottom: 4px;
    }

    .result-jyutping {
      font-size: 1rem;
      color: #a78bfa;
      font-style: italic;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .result-translation {
      font-size: 1.5rem;
      color: #93c5fd;
      line-height: 1.5;
    }

    .result-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .speak-btn {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: #c4b5fd;
      padding: 8px 16px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .speak-btn:active { transform: scale(0.95); background: rgba(139, 92, 246, 0.35); }

    .translating-text {
      font-size: 1rem;
      color: #6b6b7b;
      font-style: italic;
    }

    /* Status / Init overlays */
    .status-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 14, 26, 0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 40;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .status-overlay.active { opacity: 1; visibility: visible; }

    .status-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text { font-size: 0.95rem; color: #c4b5fd; text-align: center; }
    .status-progress { font-size: 0.8rem; color: #6b6b7b; }

    .init-overlay {
      position: absolute;
      inset: 0;
      background: rgba(10, 14, 26, 0.95);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 45;
    }

    .init-overlay.hidden { display: none; }
    .init-icon { font-size: 3.5rem; }

    .init-text {
      font-size: 1rem;
      color: #c4b5fd;
      text-align: center;
      line-height: 1.6;
      padding: 0 20px;
    }

    .init-btn {
      padding: 12px 32px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      -webkit-tap-highlight-color: transparent;
    }

    .init-btn:active { transform: scale(0.97); }

    .error-msg {
      color: #f87171;
      font-size: 0.85rem;
      text-align: center;
      display: none;
      padding: 0 20px;
    }

    .key-warning {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 12px 16px;
      margin: 0 16px;
      text-align: center;
      font-size: 0.85rem;
      color: #fca5a5;
      line-height: 1.5;
    }

    .key-warning a {
      color: #60a5fa;
      text-decoration: underline;
    }

    /* Tappable words */
    .cam-word {
      display: inline;
      padding: 2px 1px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cam-word:active { background: rgba(139,92,246,0.3); }

    /* Word popup overlay */
    .word-popup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .word-popup-overlay.active { display: flex; }

    .word-popup-card {
      background: rgba(20,17,45,0.97);
      border: 1px solid rgba(139,92,246,0.3);
      border-radius: 16px;
      padding: 20px;
      max-width: 340px;
      width: 100%;
      backdrop-filter: blur(20px);
    }
    .wp-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
    .wp-word { font-size: 2rem; color: #f0f0f0; }
    .wp-jyutping { font-size: 1rem; color: #a78bfa; font-style: italic; margin-top: 4px; }
    .wp-close { background: none; border: none; color: #6b6b7b; font-size: 1.5rem; cursor: pointer; padding: 4px; }
    .wp-meaning { font-size: 0.95rem; color: #c4b5fd; margin-bottom: 12px; line-height: 1.5; }
    .wp-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .wp-btn {
      background: rgba(139,92,246,0.15);
      border: 1px solid rgba(139,92,246,0.25);
      color: #c4b5fd;
      padding: 8px 14px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    .wp-btn:active { transform: scale(0.95); background: rgba(139,92,246,0.35); }
    .wp-btn.fav { color: #fbbf24; border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.1); }
    .wp-btn.fav.saved { color: #86efac; border-color: rgba(34,197,94,0.3); background: rgba(34,197,94,0.1); }

    /* Continue shooting button */
    .continue-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }
    .continue-btn:active { transform: scale(0.98); opacity: 0.9; }
  </style>
</head>
<body>
  <div class="header">
    <h1>📷 カメラ翻訳</h1>
    <a href="./index.html" class="btn-back">← 戻る</a>
  </div>

  <div class="camera-area">
    <div class="video-container">
      <video id="camera-video" autoplay playsinline muted></video>
      <canvas id="captured-canvas"></canvas>

      <div class="camera-overlay" id="camera-overlay">
        <div class="camera-guide">📷 画面全体を認識します</div>
      </div>

      <div class="init-overlay" id="init-overlay">
        <div class="init-icon">📷</div>
        <div class="init-text">カメラで看板や文字を撮影して<br>広東語の発音と翻訳を確認</div>
        <button class="init-btn" id="start-camera-btn">カメラを起動</button>
        <div class="error-msg" id="error-msg"></div>
      </div>

      <div class="status-overlay" id="status-overlay">
        <div class="status-spinner"></div>
        <div class="status-text" id="status-text">認識中...</div>
        <div class="status-progress" id="status-progress"></div>
      </div>
    </div>

    <div class="camera-controls" id="camera-controls" style="display:none;">
      <button class="ctrl-btn" id="flip-btn" title="カメラ切替">🔄</button>
      <button class="capture-btn" id="capture-btn" title="撮影"></button>
      <button class="ctrl-btn" id="retake-btn" title="撮り直し" style="display:none;">↩️</button>
    </div>
  </div>

  <div class="results-panel" id="results-panel">
    <div class="results-handle"><div class="bar"></div></div>
    <div class="results-header">
      <h2>📖 翻訳結果</h2>
      <button class="results-close" id="results-close">✕</button>
    </div>
    <div class="results-scroll" id="results-scroll"></div>
  </div>

  <!-- Word Popup -->
  <div class="word-popup-overlay" id="word-popup-overlay">
    <div class="word-popup-card">
      <div class="wp-header">
        <div>
          <div class="wp-word" id="wp-word"></div>
          <div class="wp-jyutping" id="wp-jyutping"></div>
        </div>
        <button class="wp-close" id="wp-close">✕</button>
      </div>
      <div class="wp-meaning" id="wp-meaning"></div>
      <div class="wp-actions">
        <button class="wp-btn" id="wp-speak">🔊 発音</button>
        <button class="wp-btn fav" id="wp-fav">⭐ 単語帳に追加</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initDictionary, lookupWord, hasEntry, getAllWords } from './modules/dictionary.js';
    import { initJyutpingDictionary, toJyutping, toJyutpingSegments } from './modules/jyutping.js';
    import { translate } from './modules/translator.js';

    // State
    let stream = null;
    let facingMode = 'environment';
    let isProcessing = false;
    const userLang = localStorage.getItem('userLang') || 'en';
    const translationService = localStorage.getItem('translationService') || 'mymemory';
    const deeplApiKey = localStorage.getItem('deeplApiKey') || '';
    const deeplPlan = localStorage.getItem('deeplPlan') || 'free';

    function getGeminiKey() {
      return localStorage.getItem('geminiApiKey') || '';
    }

    // DOM
    const video = document.getElementById('camera-video');
    const canvas = document.getElementById('captured-canvas');
    const ctx = canvas.getContext('2d');
    const cameraOverlay = document.getElementById('camera-overlay');
    const initOverlay = document.getElementById('init-overlay');
    const statusOverlay = document.getElementById('status-overlay');
    const statusText = document.getElementById('status-text');
    const statusProgress = document.getElementById('status-progress');
    const errorMsg = document.getElementById('error-msg');
    const startBtn = document.getElementById('start-camera-btn');
    const captureBtn = document.getElementById('capture-btn');
    const flipBtn = document.getElementById('flip-btn');
    const retakeBtn = document.getElementById('retake-btn');
    const controls = document.getElementById('camera-controls');
    const resultsPanel = document.getElementById('results-panel');
    const resultsScroll = document.getElementById('results-scroll');
    const resultsClose = document.getElementById('results-close');

    // ═══════════════════════════
    // Camera
    // ═══════════════════════════
    async function startCamera() {
      const apiKey = getGeminiKey();
      if (!apiKey) {
        errorMsg.innerHTML = 'Gemini API Key が未設定です。<br>メイン画面の ⚙️設定 から入力してください。<br><a href="https://aistudio.google.com/apikey" target="_blank" style="color:#60a5fa;">API Keyを無料取得</a>';
        errorMsg.style.display = 'block';
        return;
      }

      try {
        errorMsg.style.display = 'none';
        if (stream) stopCamera();

        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false,
        });

        video.srcObject = stream;
        video.style.display = 'block';
        canvas.style.display = 'none';
        initOverlay.classList.add('hidden');
        controls.style.display = 'flex';
        cameraOverlay.style.display = 'flex';
        retakeBtn.style.display = 'none';
      } catch (err) {
        console.error('Camera error:', err);
        errorMsg.textContent = 'カメラへのアクセスが拒否されました。ブラウザ設定からカメラ権限を許可してください。';
        errorMsg.style.display = 'block';
      }
    }

    function stopCamera() {
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    }

    function flipCamera() {
      facingMode = facingMode === 'environment' ? 'user' : 'environment';
      startCamera();
    }

    function captureFrame() {
      if (isProcessing) return;
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      video.style.display = 'none';
      canvas.style.display = 'block';
      cameraOverlay.style.display = 'none';
      retakeBtn.style.display = 'flex';
      processWithGemini();
    }

    function retake() {
      resultsPanel.classList.remove('open');
      video.style.display = 'block';
      canvas.style.display = 'none';
      cameraOverlay.style.display = 'flex';
      retakeBtn.style.display = 'none';
    }

    // ═══════════════════════════
    // Gemini Vision API OCR
    // ═══════════════════════════

    // Models ordered by rate limit generosity (best first)
    // IDs from https://ai.google.dev/gemini-api/docs/models
    const GEMINI_MODELS = [
      'gemini-3.1-flash-lite-preview',  // 15 RPM, 250K TPM, 500 RPD — best limits
      'gemini-2.5-flash-lite',          // 10 RPM, 250K TPM, 20 RPD — stable
      'gemini-2.5-flash',              // 5 RPM, 250K TPM, 20 RPD — stable
      'gemini-3-flash-preview',         // 5 RPM, 250K TPM, 20 RPD — preview
    ];

    const OCR_PROMPT = 'この画像に写っている中国語（繁体字/簡体字）のテキストをすべて抽出してください。テキストのみを返してください。装飾や説明は不要です。中国語のテキストが見つからない場合は「NONE」とだけ返してください。';

    async function callGeminiOCR(base64, apiKey, modelName) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inlineData: { mimeType: 'image/jpeg', data: base64 } },
              { text: OCR_PROMPT }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 500 }
        })
      });

      return { response, modelName };
    }

    async function processWithGemini() {
      if (isProcessing) return;
      isProcessing = true;
      captureBtn.classList.add('processing');

      try {
        statusText.textContent = 'Gemini AIで文字を認識中...';
        statusProgress.textContent = '';
        statusOverlay.classList.add('active');

        const base64 = canvas.toDataURL('image/jpeg', 0.85).split(',')[1];
        const apiKey = getGeminiKey();

        let text = '';
        let lastError = null;

        // Try models in priority order, fallback on 429/rate limit
        for (const model of GEMINI_MODELS) {
          try {
            statusProgress.textContent = `モデル: ${model}`;
            console.log(`Trying Gemini model: ${model}`);

            const { response } = await callGeminiOCR(base64, apiKey, model);

            if (response.status === 429) {
              console.warn(`Rate limited on ${model}, trying next...`);
              lastError = `${model}: レート制限`;
              continue; // Try next model
            }

            if (!response.ok) {
              const errData = await response.json().catch(() => ({}));
              const errMsg = errData?.error?.message || `API Error ${response.status}`;
              // If model not found (404), try next
              if (response.status === 404) {
                console.warn(`Model ${model} not found, trying next...`);
                lastError = `${model}: モデル未対応`;
                continue;
              }
              throw new Error(errMsg);
            }

            const result = await response.json();
            text = result?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
            console.log(`Gemini OCR success with ${model}:`, text);
            break; // Success, stop trying

          } catch (modelErr) {
            console.warn(`Error with ${model}:`, modelErr.message);
            lastError = modelErr.message;
            continue; // Try next model
          }
        }

        statusOverlay.classList.remove('active');

        if (!text && lastError) {
          showNoResults('⚠️ 全モデルでエラー: ' + lastError);
        } else if (!text || text === 'NONE') {
          showNoResults();
        } else {
          showResults(text);
        }
      } catch (err) {
        console.error('Gemini OCR error:', err);
        statusOverlay.classList.remove('active');
        showNoResults('⚠️ ' + err.message);
      }

      isProcessing = false;
      captureBtn.classList.remove('processing');
    }

    // ═══════════════════════════
    // Results — Translation Mode
    // ═══════════════════════════
    function showNoResults(msg) {
      resultsScroll.innerHTML = `
        <div style="text-align:center; padding:40px 20px; color:#6b6b7b;">
          <div style="font-size:2rem; margin-bottom:12px;">🔍</div>
          <p>${msg || '文字が認識できませんでした。別の角度で再度お試しください。'}</p>
        </div>`;
      resultsPanel.classList.add('open');
    }

    async function showResults(rawText) {
      // Clean: extract Chinese characters and common punctuation
      const chineseOnly = rawText.replace(/[^\u4e00-\u9fff\u3400-\u4dbf\uff01-\uff5e\u3000-\u303f]/g, '');

      if (!chineseOnly) {
        showNoResults('中国語の文字が認識できませんでした。');
        return;
      }

      const jyutping = toJyutping(chineseOnly);
      const transLangLabel = userLang === 'ja' ? '日本語' : 'English';

      // Generate thumbnail of captured image
      const thumbSrc = canvas.toDataURL('image/jpeg', 0.6);

      // Build tappable word segments
      const allWords = getAllWords();
      const segments = toJyutpingSegments(chineseOnly, allWords);
      const wordsHtml = segments.map(seg => {
        if (seg.isChinese && seg.text.trim()) {
          return `<span class="cam-word" data-word="${escapeHtml(seg.text)}" data-jp="${escapeHtml(seg.jyutping)}">${escapeHtml(seg.text)}</span>`;
        }
        return escapeHtml(seg.text);
      }).join('');

      resultsScroll.innerHTML = `
        <div class="result-section">
          <div class="result-label">📷 認識範囲（撮影画像全体）</div>
          <img class="captured-thumb" src="${thumbSrc}" alt="撮影画像" />
          <div class="result-label" style="margin-top:4px;">認識テキスト（タップで辞書検索）</div>
          <div class="result-text">${wordsHtml}</div>
          <div class="result-jyutping">${escapeHtml(jyutping)}</div>
          <div class="result-actions">
            <button class="speak-btn" onclick="speakText('${escapeAttr(chineseOnly)}','zh-HK')">🔊 広東語</button>
          </div>
        </div>
        <div class="result-section" id="translation-section">
          <div class="result-label">翻訳（${transLangLabel}）</div>
          <div class="translating-text" id="translation-text">翻訳中...</div>
          <div class="result-actions" id="translation-actions" style="display:none;"></div>
        </div>
        <button class="continue-btn" id="continue-shooting">📷 続けて撮影</button>`;

      // Bind word taps
      resultsScroll.querySelectorAll('.cam-word').forEach(el => {
        el.addEventListener('click', () => showWordPopup(el.dataset.word, el.dataset.jp));
      });

      // Bind continue shooting
      document.getElementById('continue-shooting')?.addEventListener('click', () => {
        resultsPanel.classList.remove('open');
        retake();
      });

      resultsPanel.classList.add('open');

      // Translate
      try {
        const targetLang = userLang === 'ja' ? 'ja' : 'en';
        const translated = await translate(chineseOnly, 'zh', targetLang, {
          service: translationService,
          apiKey: deeplApiKey,
          plan: deeplPlan,
        });

        const elText = document.getElementById('translation-text');
        const elActions = document.getElementById('translation-actions');
        if (elText && elActions) {
          elText.className = 'result-translation';
          elText.textContent = translated;
          elActions.style.display = 'flex';
          elActions.innerHTML = `
            <button class="speak-btn" onclick="speakText('${escapeAttr(translated)}','${userLang === 'ja' ? 'ja-JP' : 'en-US'}')">🔊 ${userLang === 'ja' ? '日本語' : 'English'}</button>`;
        }

        // Save to chat history (same format as chat messages)
        saveToChatHistory(chineseOnly, translated, jyutping);

      } catch (err) {
        const elText = document.getElementById('translation-text');
        if (elText) {
          elText.textContent = '⚠️ 翻訳エラー: ' + err.message;
          elText.style.color = '#f87171';
        }
        // Save even if translation fails
        saveToChatHistory(chineseOnly, '', jyutping);
      }
    }

    function saveToChatHistory(cantoneseText, translated, jyutping) {
      try {
        const history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
        history.push({
          original: cantoneseText,
          translated: translated,
          cantoneseText: cantoneseText,
          jyutping: jyutping,
          side: 'camera',
          time: new Date().toISOString(),
        });
        // Keep max 100
        while (history.length > 100) history.shift();
        localStorage.setItem('chatHistory', JSON.stringify(history));
        console.log('Camera OCR result saved to chat history');
      } catch (e) {
        console.warn('Failed to save camera result to history:', e);
      }
    }

    // ═══════════════════════════
    // Utilities
    // ═══════════════════════════
    function escapeHtml(s) {
      if (!s) return '';
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escapeAttr(s) {
      if (!s) return '';
      return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
    }

    window.speakText = function(text, lang) {
      if (!text || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.rate = 0.9;
      const voices = window.speechSynthesis.getVoices();
      if (lang === 'zh-HK') {
        const v = voices.find(v => v.lang === 'zh-HK' || v.lang === 'yue-HK' || v.name.toLowerCase().includes('cantonese'));
        if (v) u.voice = v;
      } else {
        const prefix = lang.split('-')[0];
        const v = voices.find(v => v.lang === lang) || voices.find(v => v.lang.startsWith(prefix));
        if (v) u.voice = v;
      }
      window.speechSynthesis.speak(u);
    };

    if (window.speechSynthesis) {
      window.speechSynthesis.getVoices();
      window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    }

    // ═══════════════════════════
    // Word Popup
    // ═══════════════════════════
    const wpOverlay = document.getElementById('word-popup-overlay');
    const wpWord = document.getElementById('wp-word');
    const wpJyutping = document.getElementById('wp-jyutping');
    const wpMeaning = document.getElementById('wp-meaning');
    const wpSpeak = document.getElementById('wp-speak');
    const wpFav = document.getElementById('wp-fav');
    const wpClose = document.getElementById('wp-close');
    let currentPopupWord = '';

    function showWordPopup(word, jp) {
      currentPopupWord = word;
      wpWord.textContent = word;
      wpJyutping.textContent = jp || toJyutping(word);

      const entry = lookupWord(word);
      if (entry) {
        const meanings = [];
        if (entry.meaning_en) meanings.push(entry.meaning_en);
        if (entry.meaning_ja) meanings.push(entry.meaning_ja);
        wpMeaning.textContent = meanings.join(' / ') || '';
      } else {
        wpMeaning.textContent = '';
      }

      // Check if already in favorites
      const favs = JSON.parse(localStorage.getItem('favoriteWords') || '[]');
      const isSaved = favs.some(f => f.word === word);
      wpFav.textContent = isSaved ? '✅ 追加済み' : '⭐ 単語帳に追加';
      wpFav.className = isSaved ? 'wp-btn fav saved' : 'wp-btn fav';

      wpOverlay.classList.add('active');
    }

    wpClose.addEventListener('click', () => wpOverlay.classList.remove('active'));
    wpOverlay.addEventListener('click', (e) => { if (e.target === wpOverlay) wpOverlay.classList.remove('active'); });

    wpSpeak.addEventListener('click', () => {
      if (currentPopupWord) window.speakText(currentPopupWord, 'zh-HK');
    });

    wpFav.addEventListener('click', () => {
      if (!currentPopupWord) return;
      const favs = JSON.parse(localStorage.getItem('favoriteWords') || '[]');
      if (favs.some(f => f.word === currentPopupWord)) return;
      favs.push({
        word: currentPopupWord,
        jyutping: wpJyutping.textContent,
        meaning: wpMeaning.textContent,
        addedAt: new Date().toISOString(),
      });
      localStorage.setItem('favoriteWords', JSON.stringify(favs));
      wpFav.textContent = '✅ 追加済み';
      wpFav.className = 'wp-btn fav saved';
    });

    // Events
    startBtn.addEventListener('click', startCamera);
    captureBtn.addEventListener('click', captureFrame);
    flipBtn.addEventListener('click', flipCamera);
    retakeBtn.addEventListener('click', retake);
    resultsClose.addEventListener('click', () => { resultsPanel.classList.remove('open'); retake(); });

    // Init dictionaries
    (async () => {
      await Promise.all([initDictionary(), initJyutpingDictionary()]);
      console.log('Dictionary and Jyutping ready');

      // Check if API key is set
      if (!getGeminiKey()) {
        const initText = document.querySelector('.init-text');
        if (initText) {
          initText.innerHTML = 'カメラ翻訳には Gemini API Key が必要です。<br>メイン画面の ⚙️設定 から入力してください。<br><br><a href="https://aistudio.google.com/apikey" target="_blank" style="color:#60a5fa; text-decoration:underline;">API Keyを無料取得 →</a>';
        }
      }
    })();
  </script>
</body>
</html>
