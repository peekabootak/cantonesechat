<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>単語帳 — Cantonese Chat</title>
  <meta name="description" content="お気に入りの広東語単語を管理・復習できる単語帳ページです。" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+HK:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-card: rgba(30, 27, 55, 0.8);
      --text-primary: #e0e0e0;
      --accent: #a78bfa;
      --accent-secondary: #6c5ce7;
      --border: rgba(139, 92, 246, 0.2);
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans HK', sans-serif;
      background: var(--bg-primary);
      background: linear-gradient(135deg, #0f0c29, #1a1440, #24243e);
      color: var(--text-primary);
      min-height: 100vh;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    /* ─── Header ─── */
    .header {
      background: rgba(15, 12, 41, 0.95);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.3);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header h1 {
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-actions {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    /* ─── Buttons ─── */
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .btn-back {
      background: rgba(139, 92, 246, 0.2);
      color: var(--accent);
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .btn-back:hover { background: rgba(139, 92, 246, 0.4); }

    .btn-clear {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .btn-clear:hover { background: rgba(239, 68, 68, 0.35); }

    .count-badge {
      background: rgba(139, 92, 246, 0.25);
      color: #c4b5fd;
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8rem;
    }

    /* ─── Container ─── */
    .container {
      max-width: 700px;
      margin: 0 auto;
      padding: 20px 16px;
    }

    /* ─── Search ─── */
    .search-wrapper {
      margin-bottom: 20px;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(30, 27, 55, 0.9);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      border-color: rgba(139, 92, 246, 0.5);
    }
    .search-input::placeholder { color: #6b6b7b; }

    /* ─── Empty state ─── */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: #8b8b9a;
    }
    .empty-state .emoji { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.2rem; margin-bottom: 8px; color: #a0a0b0; }
    .empty-state p { line-height: 1.6; }

    /* ─── Word Cards ─── */
    .word-card {
      background: var(--bg-card);
      border: 1px solid rgba(139, 92, 246, 0.15);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 12px;
      transition: border-color 0.2s ease, transform 0.15s ease;
      animation: cardFadeIn 0.3s ease forwards;
      opacity: 0;
    }
    .word-card:hover {
      border-color: rgba(139, 92, 246, 0.4);
    }

    @keyframes cardFadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .word-main {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f0f0f0;
      margin-bottom: 6px;
      font-family: 'Noto Sans HK', sans-serif;
      line-height: 1.3;
    }

    .word-jyutping {
      font-size: 0.88rem;
      color: #60a5fa;
      font-style: italic;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .word-meaning {
      font-size: 0.95rem;
      color: #c4b5fd;
      line-height: 1.5;
      margin-bottom: 4px;
    }

    .word-date {
      font-size: 0.72rem;
      color: #5a5a6a;
      margin-top: 4px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid rgba(139, 92, 246, 0.1);
    }

    .action-btn {
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.25);
      color: #c4b5fd;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
    }
    .action-btn:hover {
      background: rgba(139, 92, 246, 0.35);
    }
    .action-btn:active {
      transform: scale(0.95);
    }

    .action-btn.delete {
      background: rgba(239, 68, 68, 0.12);
      border-color: rgba(239, 68, 68, 0.25);
      color: #f87171;
      margin-left: auto;
    }
    .action-btn.delete:hover {
      background: rgba(239, 68, 68, 0.3);
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(30, 27, 55, 0.95);
      border: 1px solid rgba(139, 92, 246, 0.4);
      backdrop-filter: blur(16px);
      color: #e0e0e0;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.9rem;
      z-index: 200;
      opacity: 0;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ─── Responsive ─── */
    @media (max-width: 480px) {
      .header { padding: 12px 14px; }
      .header h1 { font-size: 1rem; }
      .container { padding: 12px 10px; }
      .word-main { font-size: 1.4rem; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>⭐ 単語帳</h1>
    <div class="header-actions">
      <span class="count-badge" id="count-badge">0件</span>
      <button class="btn btn-clear" id="clear-btn" title="すべての単語を削除">🗑️ 全削除</button>
      <a href="./index.html" class="btn btn-back">← 戻る</a>
    </div>
  </div>

  <div class="container">
    <div class="search-wrapper">
      <input type="text" class="search-input" id="search-input" placeholder="🔍 単語・粤拼・意味で検索...">
    </div>
    <div id="favorites-list"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─── DOM refs ───
    const favoritesList = document.getElementById('favorites-list');
    const countBadge = document.getElementById('count-badge');
    const clearBtn = document.getElementById('clear-btn');
    const searchInput = document.getElementById('search-input');
    const toastEl = document.getElementById('toast');

    // ─── LocalStorage helpers ───
    function loadFavorites() {
      try {
        return JSON.parse(localStorage.getItem('favoriteWords') || '[]');
      } catch { return []; }
    }

    function saveFavorites(arr) {
      localStorage.setItem('favoriteWords', JSON.stringify(arr));
    }

    // ─── Toast notification ───
    let toastTimer;
    function showToast(msg) {
      clearTimeout(toastTimer);
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2200);
    }

    // ─── Escape helpers ───
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function escapeAttr(str) {
      if (!str) return '';
      return str.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/\n/g,' ');
    }

    // ─── Speak (Web Speech API, zh-HK for Cantonese) ───
    function speak(text) {
      if (!text || !window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'zh-HK';
      u.rate = 0.85;
      window.speechSynthesis.speak(u);
    }

    // ─── Delete single word ───
    function deleteWord(index) {
      const favorites = loadFavorites();
      if (index < 0 || index >= favorites.length) return;
      const removed = favorites.splice(index, 1)[0];
      saveFavorites(favorites);
      showToast(`「${removed.word}」を削除しました`);
      renderFavorites(searchInput.value.trim());
    }

    // ─── Format date ───
    function formatDate(isoStr) {
      if (!isoStr) return '';
      const d = new Date(isoStr);
      if (isNaN(d.getTime())) return '';
      const now = new Date();
      const y = d.getFullYear(), m = d.getMonth(), day = d.getDate();
      const ny = now.getFullYear(), nm = now.getMonth(), nday = now.getDate();
      if (y === ny && m === nm && day === nday) return '今日';
      const yesterday = new Date(now); yesterday.setDate(nday - 1);
      if (y === yesterday.getFullYear() && m === yesterday.getMonth() && day === yesterday.getDate()) return '昨日';
      return `${y}/${(m+1).toString().padStart(2,'0')}/${day.toString().padStart(2,'0')}`;
    }

    // ─── Render ───
    function renderFavorites(filter = '') {
      let favorites = loadFavorites();
      const lf = filter.toLowerCase();

      if (lf) {
        favorites = favorites.filter(w =>
          (w.word || '').toLowerCase().includes(lf) ||
          (w.jyutping || '').toLowerCase().includes(lf) ||
          (w.meaning || '').toLowerCase().includes(lf)
        );
      }

      countBadge.textContent = `${favorites.length}件`;

      if (favorites.length === 0) {
        favoritesList.innerHTML = `
          <div class="empty-state">
            <div class="emoji">📚</div>
            <h2>${filter ? '検索結果なし' : 'まだ単語がありません'}</h2>
            <p>${filter ? '別のキーワードで検索してください' : 'チャット中に気になる単語をお気に入りに追加すると、ここに表示されます。'}</p>
          </div>`;
        return;
      }

      // Show newest first
      const reversed = favorites.map((w, i) => ({ ...w, _idx: i })).reverse();
      let html = '';

      reversed.forEach((w, vi) => {
        const dateStr = formatDate(w.addedAt);
        html += `
          <div class="word-card" style="animation-delay: ${Math.min(vi * 0.04, 0.5)}s">
            <div class="word-main">${escapeHtml(w.word)}</div>
            ${w.jyutping ? `<div class="word-jyutping">${escapeHtml(w.jyutping)}</div>` : ''}
            ${w.meaning ? `<div class="word-meaning">${escapeHtml(w.meaning)}</div>` : ''}
            ${dateStr ? `<div class="word-date">追加: ${dateStr}</div>` : ''}
            <div class="card-actions">
              <button class="action-btn" onclick="speak('${escapeAttr(w.word)}')" title="発音する">🔊 発音</button>
              <button class="action-btn delete" onclick="deleteWord(${w._idx})" title="削除する">❌ 削除</button>
            </div>
          </div>`;
      });

      favoritesList.innerHTML = html;
    }

    // ─── Clear all ───
    clearBtn.addEventListener('click', () => {
      const favorites = loadFavorites();
      if (favorites.length === 0) {
        showToast('単語帳は空です');
        return;
      }
      if (confirm(`単語帳の${favorites.length}件をすべて削除しますか？`)) {
        localStorage.removeItem('favoriteWords');
        showToast('すべての単語を削除しました');
        renderFavorites();
      }
    });

    // ─── Search with debounce ───
    let searchTimer;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => renderFavorites(searchInput.value.trim()), 200);
    });

    // ─── Export: addToFavorites API ───
    /**
     * Add a word to favorites. Can be called from other pages:
     *   window.addToFavorites('你好', 'nei5 hou2', 'こんにちは')
     *
     * Also available as a standalone function importable via:
     *   const { addToFavorites } = await import('./favorites-api.js') // if modularised
     */
    window.addToFavorites = function(word, jyutping, meaning) {
      if (!word) return false;
      const favorites = loadFavorites();
      // Prevent exact duplicates
      const exists = favorites.some(w => w.word === word && w.jyutping === jyutping);
      if (exists) return false;
      favorites.push({
        word: word,
        jyutping: jyutping || '',
        meaning: meaning || '',
        addedAt: new Date().toISOString()
      });
      saveFavorites(favorites);
      return true;
    };

    // ─── Init ───
    renderFavorites();
  </script>
</body>
</html>
